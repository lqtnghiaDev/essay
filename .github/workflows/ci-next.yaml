  #   steps:
  #     - name: Placeholder deploy
  #       run: echo "deploy dev"

  # ── DAST scan, dev only ──────────────────────────────────────────────────────
  dast:
    name: DAST (dev)
    needs: [resolve] # deploy-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: DAST scan
        uses: ./.github/actions/dast-scan
        with:
          TARGET_URL: ${{ needs.resolve.outputs.app-url-dev }}

  # ── Performance test, runs in parallel with DAST ──────────────────────────────
  performance:
    name: Performance (dev) / ${{ matrix.profile }}
    needs: [resolve] # deploy-dev
    runs-on: ubuntu-latest
    # soak runs ~40m; the rest finish in <10m. Legs run in parallel, so the
    # job's wall-clock is bounded by soak. fail-fast: false keeps a threshold
    # breach in one profile from cancelling the others.
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        profile: [smoke, load, stress, spike, soak]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Performance test
        uses: ./.github/actions/perf-test
        with:
          TARGET_URL: ${{ needs.resolve.outputs.app-url-dev }}
          K6_SCRIPT: k6/${{ matrix.profile }}-test.js
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

  # ── Deploy to qa (stub: no separate QA account yet) ──────────────────────────
  deploy-qa:
    name: Deploy frontend to qa
    needs: [resolve, performance, dast] # deploy-dev
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/feature/*') ||
        github.event_name == 'workflow_dispatch'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder deploy
        run: echo "deploy qa"

