name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
    # paths:
    #   - "fe/**"
    #   - ".github/workflows/ci-next.yaml"
    #   - ".github/workflows/build.yaml"
    #   - ".github/workflows/resolve-env.yaml"
    #   - ".github/actions/build-push-ecr/**"
    #   - ".github/actions/sca-scan/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "fe/**"
      - ".github/workflows/ci-next.yaml"
      - ".github/workflows/build.yaml"
      - ".github/workflows/resolve-env.yaml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/sca-scan/**"
  workflow_dispatch:

concurrency:
  group: ci-next-${{ github.ref }}
  cancel-in-progress: true

permissions:
  deployments: read
  pull-requests: read
  repository-projects: read
  actions: write
  checks: read
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  BUILD_CONTEXT: ./fe
  BUILD_DOCKERFILE: ./fe/Dockerfile
  BUILD_ARGS: |
    NEXT_PUBLIC_API_BASE_URL=https://api.duychien.shop

