name: Build & Push Frontend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "fe/**"
      - ".github/workflows/build-next.yml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/output-env/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "fe/**"
      - ".github/workflows/build-next.yml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/output-env/**"
  workflow_dispatch:

concurrency:
  group: build-next-${{ github.ref }}
  cancel-in-progress: true

permissions:
  deployments: read
  pull-requests: read
  repository-projects: read
  actions: write
  checks: read
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  BUILD_CONTEXT: ./fe
  BUILD_DOCKERFILE: ./fe/Dockerfile
  # Baked at build time. Set repo variable NEXT_PUBLIC_API_BASE_URL_STAGING to your public API
  # (e.g. https://api.example.com) so branch/PR images are not stuck on localhost when deployed.
  BUILD_BUILD_ARGS: |
    NEXT_PUBLIC_API_BASE_URL=https://api.duychien.shop

jobs:
  ci:
    name: Frontend CI
    uses: ./.github/workflows/ci.yml
    with:
      working-directory: fe
      run-coverage: true
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build:
    needs: [ci]
    environment: HUB
    name: Build frontend image
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Output environment variables
        id: output-env
        uses: ./.github/actions/output-env

      - name: Resolve image tag
        id: tag
        env:
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SHORT_SHA="${SHA::7}"
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            TAG="fe-pr-${PR_NUMBER}-${SHORT_SHA}"
          else
            SAFE_BRANCH="$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')"
            TAG="fe-${SAFE_BRANCH}-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend to ECR
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ steps.output-env.outputs.region }}
          aws-oidc-role: ${{ vars.AWS_OIDC_ROLE }}
          ecr-repository: ${{ steps.output-env.outputs.ecr-repository }}
          image-tag: ${{ steps.tag.outputs.tag }}
          tag-latest: "false"
          context: ${{ env.BUILD_CONTEXT }}
          dockerfile: ${{ env.BUILD_DOCKERFILE }}
          build-args: |
            ${{ env.BUILD_BUILD_ARGS }}
