name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "be/**"
      - ".github/workflows/ci-nest.yaml"
      - ".github/workflows/build.yaml"
      - ".github/workflows/resolve-env.yaml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/sca-scan/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "be/**"
      - ".github/workflows/ci-nest.yaml"
      - ".github/workflows/build.yaml"
      - ".github/workflows/resolve-env.yaml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/sca-scan/**"
  workflow_dispatch:

concurrency:
  group: ci-nest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  deployments: read
  pull-requests: read
  repository-projects: read
  actions: write
  checks: read
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  BUILD_CONTEXT: ./be
  BUILD_DOCKERFILE: ./be/Dockerfile

jobs:
  # ── Resolve variables & image tag ────────────────────────────────────────────
  resolve:
    name: Resolve environment
    uses: ./.github/workflows/resolve-env.yaml
    with:
      prefix: be

  # ── Lint + test (reusable) ────────────────────────────────────────────────────
  build:
    name: Backend build
    uses: ./.github/workflows/build.yaml
    with:
      working-directory: be
      install-flags: --legacy-peer-deps

  # ── Security scans (parallel) ─────────────────────────────────────────────────
  security:
    name: Security scans
    uses: ./.github/workflows/security.yml
    with:
      working-directory: be
      install-flags: --legacy-peer-deps
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── Build & push Docker image ─────────────────────────────────────────────────
  docker:
    name: Build & push backend image
    needs: [resolve, build, security]
    environment: HUB
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.docker-build.outputs.image-uri }}
      image-tag: ${{ needs.resolve.outputs.image-tag }}
      region: ${{ needs.resolve.outputs.region }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build & push backend image to ECR
        id: docker-build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ needs.resolve.outputs.region }}
          aws-oidc-role: ${{ vars.AWS_OIDC_ROLE }}
          ecr-repository: ${{ needs.resolve.outputs.ecr-repository }}
          image-tag: ${{ needs.resolve.outputs.image-tag }}
          tag-latest: ${{ github.ref_name == 'main' && 'true' || 'false' }}
          context: ${{ env.BUILD_CONTEXT }}
          dockerfile: ${{ env.BUILD_DOCKERFILE }}
