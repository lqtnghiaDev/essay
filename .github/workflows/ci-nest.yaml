name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    # paths:
    #   - "be/**"
    #   - ".github/workflows/ci-nest.yaml"
    #   - ".github/workflows/build.yaml"
    #   - ".github/workflows/resolve-env.yaml"
    #   - ".github/actions/build-push-ecr/**"
    #   - ".github/actions/sca-scan/**"
  pull_request:
    branches:
      - main
      - develop
      - feature/**
      - hotfix/**
      - release/**
    paths:
      - "be/**"
      - ".github/workflows/ci-nest.yaml"
      - ".github/workflows/build.yaml"
      - ".github/workflows/resolve-env.yaml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/sca-scan/**"
  workflow_dispatch:

concurrency:
  group: ci-nest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  deployments: read
  pull-requests: read
  repository-projects: read
  actions: write
  checks: read
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  BUILD_CONTEXT: ./be
  BUILD_DOCKERFILE: ./be/Dockerfile

jobs:
  # ── Resolve variables & image tag ────────────────────────────────────────────
  resolve:
    name: Resolve environment
    uses: ./.github/workflows/resolve-env.yaml
    with:
      prefix: be

  # ── Lint + test (reusable) ────────────────────────────────────────────────────
  build:
    name: Backend build
    uses: ./.github/workflows/build.yaml
    with:
      working-directory: be
      install-flags: --legacy-peer-deps

  # ── Security scans (parallel) ─────────────────────────────────────────────────
  security:
    name: Security scans
    uses: ./.github/workflows/security.yml
    with:
      working-directory: be
      install-flags: --legacy-peer-deps
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── Build & push Docker image ─────────────────────────────────────────────────
  build-image:
    name: Build & push backend image
    needs: [resolve, build, security]
    environment: HUB
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.docker-build.outputs.image-uri }}
      image-tag: ${{ needs.resolve.outputs.image-tag }}
      region: ${{ needs.resolve.outputs.region }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build & push backend image to ECR
        id: docker-build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ needs.resolve.outputs.region }}
          aws-oidc-role: ${{ vars.AWS_OIDC_ROLE }}
          ecr-repository: ${{ needs.resolve.outputs.ecr-repository }}
          image-tag: ${{ needs.resolve.outputs.image-tag }}
          tag-latest: ${{ github.ref_name == 'main' && 'true' || 'false' }}
          context: ${{ env.BUILD_CONTEXT }}
          dockerfile: ${{ env.BUILD_DOCKERFILE }}

  # ── Deploy to dev (build-once: reuse the image just pushed) ───────────────────
  deploy-dev:
    name: Deploy backend to dev
    needs: [resolve, build-image]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/_deploy_eks.yml
    with:
      environment: dev
      aws-region: ${{ needs.resolve.outputs.region }}
      eks-cluster: ${{ vars.EKS_CLUSTER_DEV }}
      namespace: ${{ vars.K8S_NAMESPACE_DEV }}
      backend-image-uri: ${{ needs.build-image.outputs.image-uri }}
      backend-deployment: ${{ vars.K8S_BACKEND_DEPLOYMENT_DEV }}
    secrets:
      aws-oidc-role: ${{ vars.AWS_OIDC_ROLE_DEV }}

  # ── Deploy to qa (build-once: same image as dev) ──────────────────────────────
  deploy-qa:
    name: Deploy backend to qa
    needs: [resolve, build-image]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/_deploy_eks.yml
    with:
      environment: qa
      aws-region: ${{ needs.resolve.outputs.region }}
      eks-cluster: ${{ vars.EKS_CLUSTER_QA }}
      namespace: ${{ vars.K8S_NAMESPACE_QA }}
      backend-image-uri: ${{ needs.build-image.outputs.image-uri }}
      backend-deployment: ${{ vars.K8S_BACKEND_DEPLOYMENT_QA }}
    secrets:
      aws-oidc-role: ${{ vars.AWS_OIDC_ROLE_QA }}

  # ── DAST + performance, dev only (build-once: same artifact reaches every env) ─
  post-deploy-checks:
    name: DAST & performance (dev)
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: DAST scan
        uses: ./.github/actions/dast-scan
        with:
          TARGET_URL: ${{ vars.APP_URL_DEV }}

      - name: Performance test
        uses: ./.github/actions/perf-test
        with:
          TARGET_URL: ${{ vars.APP_URL_DEV }}
          K6_SCRIPT: k6/load-test.js
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
