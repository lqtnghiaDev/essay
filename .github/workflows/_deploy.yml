name: Deploy (reusable)

# Reusable workflow — called by environment-specific workflows.
# Pulls the already-built ECR images, deploys them to ECS, then optionally
# runs DAST and performance checks against the live URL.
on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (staging | production)
        required: true
        type: string
      aws-region:
        description: AWS region
        required: true
        type: string
      backend-image-uri:
        description: Full ECR URI for the backend image
        required: true
        type: string
      frontend-image-uri:
        description: Full ECR URI for the frontend image
        required: true
        type: string
      ecs-cluster:
        description: ECS cluster name
        required: true
        type: string
      backend-service:
        description: ECS service name for the backend
        required: true
        type: string
      frontend-service:
        description: ECS service name for the frontend
        required: true
        type: string
      backend-task-definition:
        description: ECS task definition family name for the backend
        required: true
        type: string
      frontend-task-definition:
        description: ECS task definition family name for the frontend
        required: true
        type: string
      backend-container-name:
        description: Container name inside the backend task definition
        required: false
        type: string
        default: backend
      frontend-container-name:
        description: Container name inside the frontend task definition
        required: false
        type: string
        default: frontend
      run-post-checks:
        description: Run DAST and performance tests after deploy
        required: false
        type: boolean
        default: false
      app-url:
        description: Live URL of the deployed application (required when run-post-checks is true)
        required: false
        type: string
        default: ""
      k6-script:
        description: Path to k6 test script
        required: false
        type: string
        default: "fe/k6/load-test.js"
    secrets:
      aws-oidc-role:
        description: IAM role ARN to assume via OIDC
        required: true
      k6-cloud-token:
        description: Grafana Cloud k6 token for result upload (optional)
        required: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.aws-oidc-role }}
          aws-region: ${{ inputs.aws-region }}

      # ── Backend ────────────────────────────────────────────────────────────────
      - name: Download current backend task definition
        env:
          TASK_DEF: ${{ inputs.backend-task-definition }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --query taskDefinition \
            > be-task-definition.json

      - name: Render new backend task definition
        id: be-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: be-task-definition.json
          container-name: ${{ inputs.backend-container-name }}
          image: ${{ inputs.backend-image-uri }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.be-taskdef.outputs.task-definition }}
          service: ${{ inputs.backend-service }}
          cluster: ${{ inputs.ecs-cluster }}
          wait-for-service-stability: true

      # ── Frontend ───────────────────────────────────────────────────────────────
      - name: Download current frontend task definition
        env:
          TASK_DEF: ${{ inputs.frontend-task-definition }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --query taskDefinition \
            > fe-task-definition.json

      - name: Render new frontend task definition
        id: fe-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: fe-task-definition.json
          container-name: ${{ inputs.frontend-container-name }}
          image: ${{ inputs.frontend-image-uri }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.fe-taskdef.outputs.task-definition }}
          service: ${{ inputs.frontend-service }}
          cluster: ${{ inputs.ecs-cluster }}
          wait-for-service-stability: true

      # ── Post-deploy checks (staging only) ──────────────────────────────────────
      - name: DAST scan
        if: ${{ inputs.run-post-checks && inputs.app-url != '' }}
        uses: ./.github/actions/dast-scan
        with:
          TARGET_URL: ${{ inputs.app-url }}

      - name: Performance test
        if: ${{ inputs.run-post-checks && inputs.app-url != '' }}
        uses: ./.github/actions/perf-test
        with:
          TARGET_URL: ${{ inputs.app-url }}
          K6_SCRIPT: ${{ inputs.k6-script }}
          K6_CLOUD_TOKEN: ${{ secrets.k6-cloud-token }}
