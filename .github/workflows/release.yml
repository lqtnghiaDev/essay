name: Release — Build & Deploy Production

# Triggered on version tags (e.g. v1.2.3) to build fresh images and promote to production.
on:
  push:
    tags:
      - "v*.*.*"

env:
  AWS_REGION: ap-southeast-1

jobs:
  # ── Build backend ────────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build & push backend to ECR
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-oidc-role: ${{ vars.AWS_OIDC_ROLE }}
          ecr-repository: internship/backend
          image-tag: ${{ github.ref_name }}
          context: ./be
          dockerfile: ./be/Dockerfile

  # ── Build frontend ───────────────────────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build & push frontend to ECR
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-oidc-role: ${{ vars.AWS_OIDC_ROLE }}
          ecr-repository: internship/frontend
          image-tag: ${{ github.ref_name }}
          context: ./fe
          dockerfile: ./fe/Dockerfile
          build-args: NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL_PRODUCTION }}

  # ── Build frontend sourcemaps for Sentry ────────────────────────────────────
  build-sourcemaps:
    name: Build frontend sourcemaps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Build with sourcemaps
        working-directory: fe
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL_PRODUCTION }}
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.ref_name }}
        run: npm run build

      - name: Upload sourcemaps artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-sourcemaps-${{ github.ref_name }}
          path: fe/.next/static/
          retention-days: 1

  # ── Deploy to production (requires approval gate on the environment) ─────
  deploy-production:
    name: Deploy to production
    needs:
      - build-backend
      - build-frontend
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      aws-region: ap-southeast-1
      backend-image-uri: ${{ needs.build-backend.outputs.image-uri }}
      frontend-image-uri: ${{ needs.build-frontend.outputs.image-uri }}
      ecs-cluster: ${{ vars.ECS_CLUSTER_PRODUCTION }}
      backend-service: ${{ vars.ECS_BACKEND_SERVICE_PRODUCTION }}
      frontend-service: ${{ vars.ECS_FRONTEND_SERVICE_PRODUCTION }}
      backend-task-definition: ${{ vars.ECS_BACKEND_TASKDEF_PRODUCTION }}
      frontend-task-definition: ${{ vars.ECS_FRONTEND_TASKDEF_PRODUCTION }}
    secrets:
      aws-oidc-role: ${{ vars.AWS_OIDC_ROLE_PRODUCTION }}

  # ── Sentry release + sourcemap upload ───────────────────────────────────────
  sentry-release:
    name: Sentry release
    runs-on: ubuntu-latest
    needs:
      - deploy-production
      - build-sourcemaps

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Sentry release
        uses: ./.github/actions/sentry-release
        with:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          ARTIFACT_NAME: fe-sourcemaps-${{ github.ref_name }}
          VERSION: ${{ github.ref_name }}
          ENVIRONMENT: production
