name: Build & Push to ECR
description: Build a Docker image and push it to Amazon ECR

inputs:
  aws-region:
    description: AWS region where ECR lives
    required: true
  aws-oidc-role:
    description: IAM role ARN to assume via OIDC
    required: true
  ecr-repository:
    description: ECR repository name (without account/region prefix)
    required: true
  image-tag:
    description: Docker image tag (e.g. git SHA or semver)
    required: true
  context:
    description: Docker build context path
    required: true
  dockerfile:
    description: Path to Dockerfile relative to repo root
    required: true
  tag-latest:
    description: Also tag the image as 'latest' (only for production-ready builds)
    required: false
    default: "false"
  build-args:
    description: Newline-separated list of build-arg key=value pairs
    required: false
    default: ""
  platforms:
    description: Target platforms (e.g. linux/amd64,linux/arm64)
    required: false
    default: linux/amd64
  trivy-severity:
    description: Trivy severity levels to report
    required: false
    default: "CRITICAL,HIGH"


outputs:
  image-uri:
    description: Full ECR image URI with tag
    value: ${{ steps.meta.outputs.image-uri }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws-oidc-role }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Compute image URI and tags
      id: meta
      shell: bash
      env:
        TAG_LATEST: ${{ inputs.tag-latest }}
      run: |
        REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        REPO="${{ inputs.ecr-repository }}"
        IMAGE_URI="${REGISTRY}/${REPO}:${{ inputs.image-tag }}"
        TAGS="${IMAGE_URI}"
        if [ "${TAG_LATEST}" = "true" ]; then
          TAGS=$(printf '%s\n%s' "${TAGS}" "${REGISTRY}/${REPO}:latest")
        fi
        echo "image-uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
        {
          echo "tags<<EOF"
          echo "${TAGS}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push Docker image to ECR
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        build-args: ${{ inputs.build-args }}
        platforms: ${{ inputs.platforms }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.meta.outputs.image-uri }}
        format: "table"
        severity: ${{ inputs.trivy-severity }}
        # exit-code: "1"

    - name: Run Trivy image scan (SARIF)
      uses: aquasecurity/trivy-action@master
      if: always()
      with:
        image-ref: ${{ steps.meta.outputs.image-uri }}
        format: "sarif"
        output: "trivy-image-results.sarif"
        severity: ${{ inputs.trivy-severity }}

    - name: Upload Trivy image SARIF
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      continue-on-error: true
      with:
        sarif_file: "trivy-image-results.sarif"
        category: "trivy-image"

    - name: Upload Trivy image SARIF artifact
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: trivy-image-results-${{ github.sha }}
        path: trivy-image-results.sarif
        retention-days: 7

    - name: Build & scan summary
      if: always()
      shell: bash
      env:
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        SHA: ${{ github.sha }}
        IMAGE_URI: ${{ steps.meta.outputs.image-uri }}
        SEVERITY: ${{ inputs.trivy-severity }}
      run: |
        RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
        CODESCAN_URL="${SERVER_URL}/${REPOSITORY}/security/code-scanning"
        {
          echo "## Build & Push"
          echo ""
          echo "- **Image:** \`${IMAGE_URI}\`"
          echo ""
          echo "| Tool | Type | Report |"
          echo "|------|------|--------|"
          echo "| Trivy | Image scan (${SEVERITY}) | [Code Scanning ↗](${CODESCAN_URL}?query=tool%3ATrivy) · [trivy-image-results-${SHA} ↗](${RUN_URL}#artifacts) |"
        } >> "$GITHUB_STEP_SUMMARY"
