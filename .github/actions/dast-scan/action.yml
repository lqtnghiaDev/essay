name: DAST Scan
description: OWASP ZAP (baseline) · Nuclei (template-based)

inputs:
  TARGET_URL:
    description: "URL of the deployed application to scan"
    required: true
  ZAP_RULES_CONFIG:
    description: "Path to ZAP rules configuration file (optional)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    # ── OWASP ZAP — baseline passive scan ───────────────────────────────────
    - name: Run OWASP ZAP Baseline Scan (default rules)
      if: ${{ inputs.ZAP_RULES_CONFIG == '' }}
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: ${{ inputs.TARGET_URL }}
        cmd_options: "-a -j"
        allow_issue_writing: false

    - name: Run OWASP ZAP Baseline Scan (custom rules)
      if: ${{ inputs.ZAP_RULES_CONFIG != '' }}
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: ${{ inputs.TARGET_URL }}
        rules_file_name: ${{ inputs.ZAP_RULES_CONFIG }}
        cmd_options: "-a -j"
        allow_issue_writing: false

    - name: Upload ZAP report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: zap-report-${{ github.sha }}
        path: report_html.html
        retention-days: 7

    # ── Nuclei — template-based DAST scan ────────────────────────────────────
    # Installed and run via shell rather than projectdiscovery/nuclei-action:
    # marketplace actions with pre/post hooks are not supported when nested in
    # a local composite action (their cache pre-step is skipped and the post
    # cache-save races parallel jobs). Running the binary directly also lets us
    # own the exit code — DAST findings or transient scan errors must not fail
    # the pipeline (continue-on-error is unreliable inside composite actions).
    - name: Install Nuclei
      shell: bash
      env:
        NUCLEI_VERSION: "3.9.0"
      run: |
        set -euo pipefail
        tmp="$(mktemp -d)"
        curl -sSfL -o "${tmp}/nuclei.zip" \
          "https://github.com/projectdiscovery/nuclei/releases/download/v${NUCLEI_VERSION}/nuclei_${NUCLEI_VERSION}_linux_amd64.zip"
        unzip -o "${tmp}/nuclei.zip" nuclei -d "${tmp}"
        sudo install -m 0755 "${tmp}/nuclei" /usr/local/bin/nuclei
        nuclei -version
        # Fetch the template repo once. With -disable-update-check on the scan,
        # Nuclei won't auto-download templates, so a fresh runner has none.
        nuclei -update-templates

    - name: Run Nuclei DAST scan
      shell: bash
      env:
        TARGET_URL: ${{ inputs.TARGET_URL }}
      run: |
        set +e
        nuclei \
          -u "${TARGET_URL}" \
          -sarif-export nuclei-results.sarif \
          -tags exposures,misconfig,technologies \
          -disable-update-check
        status=$?
        echo "Nuclei exited with status ${status}"
        # Findings and transient scan errors are non-blocking for the pipeline.
        exit 0

    - name: Check Nuclei SARIF output
      id: nuclei-sarif
      if: always()
      shell: bash
      run: |
        if [ -f nuclei-results.sarif ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "No nuclei-results.sarif produced — skipping upload."
        fi

    - name: Upload Nuclei SARIF
      uses: github/codeql-action/upload-sarif@v4
      if: always() && steps.nuclei-sarif.outputs.exists == 'true'
      continue-on-error: true
      with:
        sarif_file: nuclei-results.sarif
        category: nuclei-dast

    - name: Upload Nuclei artifact
      uses: actions/upload-artifact@v7
      if: always() && steps.nuclei-sarif.outputs.exists == 'true'
      with:
        name: nuclei-results-${{ github.sha }}
        path: nuclei-results.sarif
        retention-days: 7

    # ── Summary ──────────────────────────────────────────────────────────────
    - name: DAST scan summary
      if: always()
      shell: bash
      env:
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        SHA: ${{ github.sha }}
        TARGET_URL: ${{ inputs.TARGET_URL }}
      run: |
        RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
        CODESCAN_URL="${SERVER_URL}/${REPOSITORY}/security/code-scanning"
        {
          echo "## DAST Scan"
          echo ""
          echo "**Target:** \`${TARGET_URL}\`"
          echo ""
          echo "| Tool | Type | Report |"
          echo "|------|------|--------|"
          echo "| OWASP ZAP | Baseline passive | [zap-report-${SHA::7} ↗](${RUN_URL}#artifacts) |"
          echo "| Nuclei | Template-based (exposures, misconfig) | [Code Scanning ↗](${CODESCAN_URL}?query=tool%3ANuclei) · [nuclei-results-${SHA::7} ↗](${RUN_URL}#artifacts) |"
        } >> "$GITHUB_STEP_SUMMARY"
