name: Sentry Release
description: Creates a Sentry release and uploads sourcemaps

inputs:
  SENTRY_AUTH_TOKEN:
    description: "Sentry authentication token"
    required: true
  SENTRY_ORG:
    description: "Sentry organization slug"
    required: true
  SENTRY_PROJECT:
    description: "Sentry project slug"
    required: true
  ARTIFACT_NAME:
    description: "Name of the build artifact to download"
    required: true
  ENVIRONMENT:
    description: "Deployment environment"
    required: false
    default: "production"
  VERSION:
    description: "Release version (defaults to git SHA)"
    required: false
    default: ""
  SOURCEMAPS_PATH:
    description: "Path to sourcemaps inside the downloaded artifact"
    required: false
    default: "./dist/static/chunks"
  URL_PREFIX:
    description: "URL prefix for sourcemaps (must match public asset path)"
    required: false
    default: "~/_next/static/chunks"

runs:
  using: composite
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.ARTIFACT_NAME }}
        path: dist

    - name: Determine version
      id: version
      shell: bash
      run: |
        if [ -n "${{ inputs.VERSION }}" ]; then
          echo "VERSION=${{ inputs.VERSION }}" >> "$GITHUB_OUTPUT"
        else
          echo "VERSION=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Sentry release
      uses: getsentry/action-release@v3
      env:
        SENTRY_AUTH_TOKEN: ${{ inputs.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ inputs.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ inputs.SENTRY_PROJECT }}
      with:
        environment: ${{ inputs.ENVIRONMENT }}
        release: ${{ steps.version.outputs.VERSION }}
        sourcemaps: ${{ inputs.SOURCEMAPS_PATH }}
        url_prefix: ${{ inputs.URL_PREFIX }}

    - name: Sentry release summary
      shell: bash
      run: |
        echo "## Sentry Release" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment:** ${{ inputs.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Org:** ${{ inputs.SENTRY_ORG }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Project:** ${{ inputs.SENTRY_PROJECT }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Sourcemaps:** ${{ inputs.SOURCEMAPS_PATH }}" >> $GITHUB_STEP_SUMMARY
