name: Performance Test (k6)
description: Runs k6 load test against a deployed URL

inputs:
  TARGET_URL:
    description: "URL of the deployed application to test"
    required: true
  K6_SCRIPT:
    description: "Path to k6 test script"
    required: false
    default: "k6/load-test.js"
  K6_CLOUD_TOKEN:
    description: "Grafana Cloud k6 token for result upload (optional)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install k6
      shell: bash
      run: |
        curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update && sudo apt-get install -y k6

    - name: Run k6 load test
      id: k6
      shell: bash
      env:
        K6_CLOUD_TOKEN: ${{ inputs.K6_CLOUD_TOKEN }}
      run: |
        # Slug from the script filename (e.g. k6/stress-test.js -> stress-test)
        # so parallel matrix legs upload distinctly named artifacts — v4+
        # artifact names are immutable and a duplicate name would error.
        slug="$(basename "${{ inputs.K6_SCRIPT }}" .js)"
        echo "slug=${slug}" >> "$GITHUB_OUTPUT"

        K6_CMD="k6 run"
        if [ -n "$K6_CLOUD_TOKEN" ]; then
          K6_CMD="k6 cloud run"
        fi

        $K6_CMD \
          --env TARGET_URL=${{ inputs.TARGET_URL }} \
          ${{ inputs.K6_SCRIPT }} | tee k6-output.txt

    - name: Upload k6 results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: k6-results-${{ steps.k6.outputs.slug }}-${{ github.sha }}
        path: |
          k6-*report.html
          k6-*summary.csv
        retention-days: 7
        if-no-files-found: ignore

    - name: Performance test summary
      if: always()
      shell: bash
      run: |
        echo "## Performance Test (k6)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Target:** ${{ inputs.TARGET_URL }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Script:** ${{ inputs.K6_SCRIPT }}" >> $GITHUB_STEP_SUMMARY
        CSV=$(ls k6-*summary.csv 2>/dev/null | head -n1)
        if [ -n "$CSV" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          tail -n +2 "$CSV" | while IFS=, read -r metric value; do
            echo "| ${metric} | ${value} |" >> $GITHUB_STEP_SUMMARY
          done
        fi
        if [ -n "${{ inputs.K6_CLOUD_TOKEN }}" ]; then
          echo "- **Results:** uploaded to Grafana Cloud k6" >> $GITHUB_STEP_SUMMARY
        fi
