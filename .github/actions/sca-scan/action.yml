name: SCA Security Scan
description: Runs Trivy filesystem scan and Snyk SCA scan on source code

inputs:
  WORKING_DIRECTORY:
    description: "Working directory to scan"
    required: false
    default: "frontend"
  SNYK_TOKEN:
    description: "Snyk API token"
    required: true
  TRIVY_SEVERITY:
    description: "Trivy severity levels to report"
    required: false
    default: "CRITICAL,HIGH"
  NODE_VERSION:
    description: "Node.js version for installing dependencies before Snyk scan"
    required: false
    default: "22"
  INSTALL_FLAGS:
    description: "Extra flags passed to npm ci (e.g. --legacy-peer-deps)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: "fs"
        scan-ref: ${{ inputs.WORKING_DIRECTORY }}
        format: "table"
        severity: ${{ inputs.TRIVY_SEVERITY }}
        # exit-code: "1"

    - name: Run Trivy filesystem scan (SARIF)
      uses: aquasecurity/trivy-action@master
      if: always()
      with:
        scan-type: "fs"
        scan-ref: ${{ inputs.WORKING_DIRECTORY }}
        format: "sarif"
        output: "trivy-fs-results.sarif"
        severity: ${{ inputs.TRIVY_SEVERITY }}

    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: "trivy-fs-results.sarif"
        category: "trivy-fs"

    - name: Setup Node.js for Snyk
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.NODE_VERSION }}

    - name: Install dependencies for Snyk
      shell: bash
      run: npm ci --prefix ${{ inputs.WORKING_DIRECTORY }} ${{ inputs.INSTALL_FLAGS }}

    - name: Run Snyk SCA scan
      uses: snyk/actions/node@0.4.0
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ inputs.SNYK_TOKEN }}
      with:
        json: true
        args: --severity-threshold=high --file=${{ inputs.WORKING_DIRECTORY }}/package.json

    - name: Convert Snyk JSON to HTML
      if: always()
      shell: bash
      run: |
        npx snyk-to-html -i snyk.json -o snyk-report.html

    - name: Upload Snyk HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snyk-report-${{ github.sha }}
        path: snyk-report.html
        retention-days: 7

    - name: SCA scan summary
      if: always()
      shell: bash
      run: |
        echo "## SCA Security Scan" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Trivy FS scan:** completed (severity: ${{ inputs.TRIVY_SEVERITY }})" >> $GITHUB_STEP_SUMMARY
        echo "- **Snyk SCA scan:** completed" >> $GITHUB_STEP_SUMMARY
